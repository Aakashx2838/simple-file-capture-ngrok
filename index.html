<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>File Upload</title>
		<style>
			:root {
				color-scheme: light;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			}

			body {
				margin: 0;
				padding: 24px;
				background: #f5f7fb;
				color: #1c2430;
			}

			main {
				max-width: 520px;
				margin: 48px auto;
				background: #ffffff;
				border-radius: 16px;
				padding: 28px;
				box-shadow: 0 20px 40px rgba(28, 36, 48, 0.12);
			}

			h1 {
				font-size: 1.6rem;
				margin: 0 0 8px;
			}

			p {
				margin: 0 0 16px;
				color: #4a5568;
			}

			form {
				display: grid;
				gap: 12px;
			}

			input[type="file"] {
				border: 1px dashed #9db0c9;
				padding: 18px;
				border-radius: 12px;
				background: #f7f9fd;
			}

			button {
				background: #2b6cb0;
				color: #ffffff;
				border: none;
				border-radius: 10px;
				padding: 12px 16px;
				font-weight: 600;
				cursor: pointer;
			}

			button:disabled {
				opacity: 0.6;
				cursor: not-allowed;
			}

			#status {
				min-height: 20px;
				font-size: 0.95rem;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Send a file</h1>
			<p>Pick a file and send it to the server.</p>
			<form id="uploadForm">
				<input type="file" name="file" id="fileInput" required />
				<button type="submit" id="uploadButton">Upload</button>
				<div id="status" role="status" aria-live="polite"></div>
			</form>
		</main>

		<script>
			const form = document.getElementById("uploadForm");
			const fileInput = document.getElementById("fileInput");
			const statusEl = document.getElementById("status");
			const uploadButton = document.getElementById("uploadButton");

			form.addEventListener("submit", async (event) => {
				event.preventDefault();
				if (!fileInput.files || fileInput.files.length === 0) {
					statusEl.textContent = "Please choose a file first.";
					return;
				}

				const formData = new FormData();
				formData.append("file", fileInput.files[0]);
				uploadButton.disabled = true;
				statusEl.textContent = "Uploading...";

				try {
					const response = await fetch("/upload", {
						method: "POST",
						body: formData,
					});

					if (!response.ok) {
						throw new Error(`Upload failed (${response.status})`);
					}

					const result = await response.json();
					statusEl.textContent = `Uploaded: ${result.originalName}`;
					form.reset();
				} catch (error) {
					statusEl.textContent = error instanceof Error ? error.message : "Upload failed.";
				} finally {
					uploadButton.disabled = false;
				}
			});
		</script>
	</body>
</html>
